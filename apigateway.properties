eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

server.port=8080

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[1].id=job-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/jobs/**

spring.cloud.gateway.server.webflux.routes[2].id=application-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/applications/**

spring.cloud.gateway.server.webflux.routes[3].id=resume-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://RESUME-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/resumes/**

spring.cloud.gateway.server.webflux.routes[4].id=search-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://SEARCH-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/search/**

spring.cloud.gateway.server.webflux.routes[5].id=analytics-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/analytics/**
